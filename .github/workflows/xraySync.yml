name: Sync Proxy Sources And Packages

on:
  push:
  workflow_dispatch:

concurrency:
  group: sync-proxy-assets
  cancel-in-progress: true

jobs:
  sync-assets:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================
      # 🔹 Sync upstream sources
      # =========================
      - name: Sync upstream sources
        run: |
          set -euo pipefail

          BASE_DIR="proxy/src"
          TMP_DIR="/tmp/upstream"

          rm -rf "$TMP_DIR"
          mkdir -p "$TMP_DIR" "$BASE_DIR"

          sync_repo() {
            local repo_url="$1"
            local name="$2"

            echo "==> Sync $name"

            git clone --depth=1 "$repo_url" "$TMP_DIR/$name"

            rm -rf "$BASE_DIR/$name"
            mkdir -p "$BASE_DIR/$name"

            cp "$TMP_DIR/$name/install.sh" "$BASE_DIR/$name/" || true
            cp "$TMP_DIR/$name/$name.sh" "$BASE_DIR/$name/" || true
            cp -r "$TMP_DIR/$name/src" "$BASE_DIR/$name/" || true

            {
              echo "source_repo=$repo_url"
              echo "source_commit=$(git -C "$TMP_DIR/$name" rev-parse HEAD)"
            } > "$BASE_DIR/$name/UPSTREAM"
          }

          sync_repo https://github.com/233boy/sing-box.git sing-box
          sync_repo https://github.com/233boy/Xray.git Xray

      # =========================
      # 🔹 Sync packages
      # =========================
      - name: Sync packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          sudo apt-get update -y
          sudo apt-get install -y jq

          mkdir -p proxy/meta proxy/files

          MAX_BYTES=$((95 * 1024 * 1024))

          get_asset() {
            local repo="$1"
            local pattern="$2"

            curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              "https://api.github.com/repos/${repo}/releases/latest" \
            | jq -c --arg re "$pattern" '
              .assets[]
              | select(.name | test($re))
              | {name, url: .browser_download_url, size}
            ' | head -n1
          }

          fetch_asset() {
            local repo="$1"
            local pattern="$2"
            local file="$3"
            local meta="$4"

            echo "==> Fetch $repo"

            local json
            json="$(get_asset "$repo" "$pattern")"

            [ -z "$json" ] && { echo "No asset"; exit 1; }

            local name url size
            name=$(echo "$json" | jq -r .name)
            url=$(echo "$json" | jq -r .url)
            size=$(echo "$json" | jq -r .size)

            {
              echo "repo=$repo"
              echo "name=$name"
              echo "size=$size"
              echo "url=$url"
            } > "$meta"

            rm -f "$file"

            if [ "$size" -le "$MAX_BYTES" ]; then
              curl -fL --retry 3 "$url" -o "$file"
            else
              echo "Skip large file: $name"
            fi
          }

          fetch_asset "XTLS/Xray-core" "Xray-windows-64\\.zip$" \
            "proxy/files/Xray.zip" "proxy/meta/Xray"

          fetch_asset "2dust/v2rayNG" "arm64-v8a\\.apk$" \
            "proxy/files/v2rayNG.apk" "proxy/meta/v2rayNG"

          fetch_asset "SagerNet/sing-box" "windows-amd64.*\\.zip$" \
            "proxy/files/sing-box.zip" "proxy/meta/sing-box"

          fetch_asset "SagerNet/sing-box" "android.*arm64-v8a.*\\.apk$|arm64-v8a.*android.*\\.apk$" \
            "proxy/files/sing-box.apk" "proxy/meta/sing-box-android"

      # =========================
      # 🔹 Commit
      # =========================
      - name: Commit changes
        run: |
          set -euo pipefail

          git add proxy

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "action@github.com"

          git commit -m "chore(proxy): sync upstream + packages"

          for i in 1 2 3; do
            git pull --rebase || true
            if git push; then
              exit 0
            fi
            sleep 2
          done

          echo "Push failed"
          exit 1
