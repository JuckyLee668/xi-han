name: Update V2Ray Config

on:
  workflow_dispatch:
    inputs:
      config_data:
        description: Base64 encoded config data
        required: true
        type: string
      commit_message:
        description: Commit message
        required: false
        default: 'chore(v2): update subscription config'
        type: string
  repository_dispatch:
    types: [update-v2-config]

concurrency:
  group: update-v2
  cancel-in-progress: true

jobs:
  update-config:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Decode payload and update v2
        id: prepare
        env:
          CONFIG_DATA_DISPATCH: ${{ github.event.client_payload.config_data || '' }}
          COMMIT_MSG_DISPATCH: ${{ github.event.client_payload.commit_message || '' }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CONFIG_DATA='${{ github.event.inputs.config_data }}'
            COMMIT_MSG='${{ github.event.inputs.commit_message }}'
          else
            CONFIG_DATA="$CONFIG_DATA_DISPATCH"
            COMMIT_MSG="$COMMIT_MSG_DISPATCH"
          fi

          if [ -z "$CONFIG_DATA" ]; then
            echo "config_data is empty"
            exit 1
          fi

          if [ -z "$COMMIT_MSG" ]; then
            COMMIT_MSG="chore(v2): update subscription config - $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          fi

          printf '%s' "$COMMIT_MSG" > .commit_msg

          # Decode Base64 payload into temporary file.
          printf '%s' "$CONFIG_DATA" | tr -d '\r\n\t ' | base64 --decode > v2.new || {
            echo "Base64 decode failed"
            exit 1
          }

          if [ ! -s v2.new ]; then
            echo "decoded content is empty"
            exit 1
          fi

          if [ -f v2 ] && cmp -s v2.new v2; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            rm -f v2.new
            echo "No changes detected in v2"
            exit 0
          fi

          mv v2.new v2
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "bytes=$(wc -c < v2)" >> "$GITHUB_OUTPUT"

      - name: Configure Git
        if: steps.prepare.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"

      - name: Commit and push changes
        if: steps.prepare.outputs.changed == 'true'
        id: commit
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          git add v2
          COMMIT_MSG="$(cat .commit_msg)"
          git commit -m "$COMMIT_MSG"
          git push origin HEAD:"$DEFAULT_BRANCH"

          NEW_SHA="$(git rev-parse HEAD)"
          echo "new_sha=$NEW_SHA" >> "$GITHUB_OUTPUT"
          echo "commit_url=${{ github.server_url }}/${{ github.repository }}/commit/$NEW_SHA" >> "$GITHUB_OUTPUT"

      - name: Update summary
        run: |
          set -euo pipefail

          echo "## V2 config update report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Event | ${{ github.event_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Time (UTC) | $(date -u +'%Y-%m-%dT%H:%M:%SZ') |" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ steps.prepare.outputs.changed }}" = "true" ]; then
            echo "| Status | updated |" >> "$GITHUB_STEP_SUMMARY"
            echo "| File size | ${{ steps.prepare.outputs.bytes }} bytes |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Commit | [${{ steps.commit.outputs.new_sha }}](${{ steps.commit.outputs.commit_url }}) |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Status | no changes |" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Sensitive config preview is intentionally hidden." >> "$GITHUB_STEP_SUMMARY"
