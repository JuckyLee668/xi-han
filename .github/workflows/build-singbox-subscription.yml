name: Build Sing-box Subscription

on:
  push:
    paths:
      - v2
  workflow_dispatch:

concurrency:
  group: singbox-build
  cancel-in-progress: true

jobs:
  build-singbox-subscription:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate sing-box subscription artifacts from v2
        run: |
          set -euo pipefail

          if [ ! -s v2 ]; then
            echo "v2 file is missing or empty"
            exit 1
          fi

          mkdir -p proxy

          # Decode base64 in stream mode and keep error details for troubleshooting.
          if ! tr -d '\r\n' < v2 | base64 --decode > proxy/sing-box 2>proxy/.decode_error.log; then
            echo "Base64 decode failed:"
            cat proxy/.decode_error.log
            exit 1
          fi

          if [ ! -s proxy/sing-box ]; then
            echo "Decoded subscription is empty"
            exit 1
          fi

          # Re-encode without line breaks for clients that expect one-line payload.
          base64 proxy/sing-box | tr -d '\n' > proxy/sing-box.b64
          rm -f proxy/.decode_error.log

          if ! grep -Eq '(vmess|vless|ss|trojan)://' proxy/sing-box; then
            echo "Warning: decoded content does not look like a standard node subscription."
          fi

          BRANCH="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"
          RAW_TXT_URL="https://raw.githubusercontent.com/${REPO}/${BRANCH}/proxy/sing-box"
          RAW_B64_URL="https://raw.githubusercontent.com/${REPO}/${BRANCH}/proxy/sing-box.b64"

          {
            echo "# sing-box 订阅地址"
            echo
            echo "- 文本订阅（推荐）: ${RAW_TXT_URL}"
            echo "- Base64订阅: ${RAW_B64_URL}"
            echo
            echo "# 生成时间（UTC）"
            date -u +'%Y-%m-%dT%H:%M:%SZ'
          } > proxy/sing-box-subscription.txt

      - name: Commit and push when changed
        run: |
          set -euo pipefail

          git add -A proxy/sing-box proxy/sing-box.b64 proxy/sing-box-subscription.txt

          if git diff --cached --quiet -- proxy/sing-box proxy/sing-box.b64 proxy/sing-box-subscription.txt; then
            echo "No generated file changes detected."
            exit 0
          fi

          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git commit -m "chore(proxy): rebuild sing-box subscription from v2"
          git push origin HEAD:${GITHUB_REF_NAME}
