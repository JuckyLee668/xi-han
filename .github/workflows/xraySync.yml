name: Sync Proxy Sources And Packages

on:
  push:
  workflow_dispatch:

concurrency:
  group: sync-proxy-assets
  cancel-in-progress: true

jobs:
  sync-assets:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync 233boy source repositories
        run: |
          set -euo pipefail

          mkdir -p proxy/src
          rm -rf /tmp/upstream-sources
          mkdir -p /tmp/upstream-sources

          git clone --depth=1 https://github.com/233boy/sing-box.git /tmp/upstream-sources/sing-box
          git clone --depth=1 https://github.com/233boy/Xray.git /tmp/upstream-sources/Xray

          rm -rf proxy/src/sing-box proxy/src/Xray
          mkdir -p proxy/src/sing-box proxy/src/Xray

          cp /tmp/upstream-sources/sing-box/install.sh proxy/src/sing-box/
          cp /tmp/upstream-sources/sing-box/sing-box.sh proxy/src/sing-box/ || true
          cp -r /tmp/upstream-sources/sing-box/src proxy/src/sing-box/

          cp /tmp/upstream-sources/Xray/install.sh proxy/src/Xray/
          cp /tmp/upstream-sources/Xray/xray.sh proxy/src/Xray/ || true
          cp -r /tmp/upstream-sources/Xray/src proxy/src/Xray/

          {
            echo "source_repo=233boy/sing-box"
            echo "source_commit=$(git -C /tmp/upstream-sources/sing-box rev-parse HEAD)"
          } > proxy/src/sing-box/UPSTREAM

          {
            echo "source_repo=233boy/Xray"
            echo "source_commit=$(git -C /tmp/upstream-sources/Xray rev-parse HEAD)"
          } > proxy/src/Xray/UPSTREAM

      - name: Sync latest proxy client package metadata and files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          command -v jq >/dev/null 2>&1 || {
            sudo apt-get update
            sudo apt-get install -y jq
          }

          mkdir -p proxy

          # GitHub single-file hard limit is 100MB; keep a safety margin.
          MAX_BYTES=$((95 * 1024 * 1024))

          get_latest_asset_json() {
            local repo="$1"
            local pattern="$2"

            local api="https://api.github.com/repos/${repo}/releases/latest"
            curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "$api" \
              | jq -c --arg re "$pattern" '.assets[] | select(.name | test($re)) | {name, browser_download_url, size}' \
              | head -n 1
          }

          save_asset_or_link() {
            local repo="$1"
            local pattern="$2"
            local local_file="$3"
            local link_file="$4"

            local asset_json
            asset_json="$(get_latest_asset_json "$repo" "$pattern")"
            if [ -z "$asset_json" ] || [ "$asset_json" = "null" ]; then
              echo "No asset matched pattern ${pattern} in ${repo}"
              exit 1
            fi

            local name url size
            name="$(echo "$asset_json" | jq -r '.name')"
            url="$(echo "$asset_json" | jq -r '.browser_download_url')"
            size="$(echo "$asset_json" | jq -r '.size')"

            {
              echo "repo=${repo}"
              echo "name=${name}"
              echo "size_bytes=${size}"
              echo "download_url=${url}"
            } > "$link_file"

            # Remove stale binary before optionally downloading a fresh one.
            rm -f "$local_file"

            if [ "$size" -gt "$MAX_BYTES" ]; then
              echo "Skip ${name} (${size} bytes): exceeds safe git size."
              return 0
            fi

            echo "Downloading ${name} (${size} bytes)"
            curl -fL --retry 3 --retry-delay 2 "$url" -o "$local_file"
          }

          save_asset_or_link "XTLS/Xray-core" "Xray-windows-64\\.zip$" "proxy/Xray-windows-64.zip"
          save_asset_or_link "2dust/v2rayNG" "arm64-v8a\\.apk$" "proxy/v2rayNG-android-arm64-v8a.apk"
          save_asset_or_link "SagerNet/sing-box" "windows-amd64.*\\.zip$" "proxy/sing-box-windows-amd64.zip"
          save_asset_or_link "SagerNet/sing-box" "android.*arm64-v8a.*\\.apk$|arm64-v8a.*android.*\\.apk$" "proxy/sing-box-android-arm64-v8a.apk"
      - name: Write package metadata
        run: |
          set -euo pipefail
          {
            echo "xray_core_file=proxy/Xray-windows-64.zip"
            echo "v2rayNG_file=proxy/v2rayNG-android-arm64-v8a.apk"
            echo "sing_box_file=proxy/sing-box-windows-amd64.zip"
            echo "sing_box_android_file=proxy/sing-box-android-arm64-v8a.apk"
          } 

      - name: Commit and push when changed
        run: |
          set -euo pipefail

          git add -A proxy/src \
            proxy/Xray-windows-64.zip  \
            proxy/v2rayNG-android-arm64-v8a.apk \
            proxy/sing-box-windows-amd64.zip  \
            proxy/sing-box-android-arm64-v8a.apk  \

          if git diff --cached --quiet -- proxy/src \
            proxy/Xray-windows-64.zip \
            proxy/v2rayNG-android-arm64-v8a.apk \
            proxy/sing-box-windows-amd64.zip  \
            proxy/sing-box-android-arm64-v8a.apk  ; then
            echo "No source/package changes detected."
            exit 0
          fi

          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git commit -m "chore(proxy): sync sources and package metadata/files"

          BRANCH="${GITHUB_REF_NAME}"
          for i in 1 2 3; do
            if git push origin HEAD:"${BRANCH}"; then
              echo "Push succeeded on attempt ${i}"
              exit 0
            fi
            echo "Push failed on attempt ${i}, rebasing..."
            git fetch origin "${BRANCH}"
            git rebase "origin/${BRANCH}" || {
              git rebase --abort || true
              echo "Rebase failed"
              exit 1
            }
          done

          echo "Push failed after 3 attempts"
          exit 1
