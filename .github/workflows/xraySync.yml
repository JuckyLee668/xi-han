name: Sync 233boy Sources

on:
  push:
  workflow_dispatch:

jobs:
  sync-sources:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone upstream repositories and copy key files
        run: |
          set -euo pipefail

          mkdir -p proxy/src
          rm -rf /tmp/upstream-sources
          mkdir -p /tmp/upstream-sources

          git clone --depth=1 https://github.com/233boy/sing-box.git /tmp/upstream-sources/sing-box
          git clone --depth=1 https://github.com/233boy/Xray.git /tmp/upstream-sources/Xray

          rm -rf proxy/src/sing-box proxy/src/Xray
          mkdir -p proxy/src/sing-box proxy/src/Xray

          cp /tmp/upstream-sources/sing-box/install.sh proxy/src/sing-box/
          cp /tmp/upstream-sources/sing-box/sing-box.sh proxy/src/sing-box/ || true
          cp -r /tmp/upstream-sources/sing-box/src proxy/src/sing-box/

          cp /tmp/upstream-sources/Xray/install.sh proxy/src/Xray/
          cp /tmp/upstream-sources/Xray/xray.sh proxy/src/Xray/ || true
          cp -r /tmp/upstream-sources/Xray/src proxy/src/Xray/

          echo "source_repo=233boy/sing-box" > proxy/src/sing-box/UPSTREAM
          echo "source_commit=$(git -C /tmp/upstream-sources/sing-box rev-parse HEAD)" >> proxy/src/sing-box/UPSTREAM
          echo "synced_at_utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> proxy/src/sing-box/UPSTREAM

          echo "source_repo=233boy/Xray" > proxy/src/Xray/UPSTREAM
          echo "source_commit=$(git -C /tmp/upstream-sources/Xray rev-parse HEAD)" >> proxy/src/Xray/UPSTREAM
          echo "synced_at_utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> proxy/src/Xray/UPSTREAM

      - name: Commit and push when changed
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No source changes detected."
            exit 0
          fi

          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add proxy/src
          git commit -m "chore(proxy): sync 233boy sing-box and Xray sources"
          git push
